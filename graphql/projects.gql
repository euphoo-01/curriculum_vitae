query GetProjects {
  projects {
    id
    name
    internal_name
    domain
    start_date
    end_date
    description
    environment
  }
}

query GetProject($projectId: ID!) {
  project(projectId: $projectId) {
    id
    name
    internal_name
    domain
    start_date
    end_date
    description
    environment
  }
}

mutation CreateProject($project: CreateProjectInput!) {
  createProject(project: $project) {
    id
    name
    internal_name
    domain
    start_date
    end_date
    description
    environment
  }
}

mutation UpdateProject($project: UpdateProjectInput!) {
  updateProject(project: $project) {
    id
    name
    internal_name
    domain
    start_date
    end_date
    description
    environment
  }
}

mutation DeleteProject($projectId: ID!) {
  deleteProject(project: { projectId: $projectId }) {
    affected
  }
}
